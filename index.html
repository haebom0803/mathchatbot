<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>수학 친구 — Stage 3 v4</title>
<style>
  body { font-family: sans-serif; max-width: 560px; margin: 0 auto; background: #f0f4f8; }
  #chat { height: 70vh; overflow-y: auto; padding: 12px; }
  .msg { max-width: 80%; padding: 10px 14px; border-radius: 14px; margin: 6px 0; white-space: pre-wrap; line-height: 1.5; }
  .bot { background: #fff; border: 1px solid #ddd; }
  .me { background: #4a90d9; color: #fff; margin-left: auto; }
  .sys { text-align: center; font-size: 0.85em; color: #888; margin: 8px 0; }
  #inputBar { display: flex; gap: 8px; padding: 10px; background: #fff; }
  #userInput { flex: 1; padding: 10px; border: 1px solid #ccc; border-radius: 8px; font-size: 1em; }
  button { padding: 10px 18px; border: 0; border-radius: 8px; background: #4a90d9; color: #fff; font-size: 1em; cursor: pointer; }
</style>
</head>
<body>
<div id="chat"></div>
<div id="inputBar">
  <input id="userInput" type="text" placeholder="답을 입력해줘" autocomplete="off">
  <button id="sendBtn">보내기</button>
</div>

<script>
// ===== PART 0. 공통 유틸 (변경 없음) =====
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }
function norm(s) { return String(s).replace(/\s/g, ''); }
function gcd(a, b) { return b ? gcd(b, a % b) : a; }
function lcm(a, b) { return a * b / gcd(a, b); }
function reduceFrac(n, d) { var g = gcd(n, d); return (n / g) + '/' + (d / g); }
function accFrac(n, d) {
  var g = gcd(n, d), rn = n / g, rd = d / g;
  var arr = (rd === 1) ? [String(rn), rn + '/1'] : [rn + '/' + rd];
  if (rn + '/' + rd !== n + '/' + d) arr.push(n + '/' + d);
  return arr;
}
// [신규] 소수 문자열 포맷 (trailing .0 정리용 — 소수÷소수에서 몫이 자연수로 떨어질 때 사용)
function trimDec(s) { return s.replace(/\.0$/, ''); }

// ===== PART 1. 레벨 메타 — [v7 변경] 트랙명 전부 한글화 + 소수(7)·혼합계산(3) 신설 + 비 2→5레벨 확장 =====
// 7트랙 34레벨: 곱셈4 → 나눗셈3 → 혼합계산3 → 배수약수4 → 소수7 → 분수8 → 비5
var TRACK_LEVELS = {
  '곱셈':   ['곱셈1','곱셈2','곱셈3','곱셈4'],
  '나눗셈': ['나눗셈1','나눗셈2','나눗셈3'],
  '혼합계산': ['혼합계산1','혼합계산2','혼합계산3'],          // [신규]
  '배수약수': ['배수약수1','배수약수2','배수약수3','배수약수4'],
  '소수':   ['소수1','소수2','소수3','소수4','소수5','소수6','소수7'],  // [신규]
  '분수':   ['분수1','분수2','분수3','분수4','분수5','분수6','분수7','분수8'],
  '비':     ['비1','비2','비3','비4','비5']                    // [변경] 비율·백분율·비례배분 추가, 기존 P2는 비4로 재배치
};
var GATE_TRACKS = ['곱셈','나눗셈','혼합계산','배수약수','소수','분수','비'];
// [신규] 각 트랙의 게이트 대표 레벨 (진단 1단에서 이 레벨 난이도의 문항을 GEN으로 즉석 생성)
var GATE_LEVEL = { '곱셈':'곱셈3', '나눗셈':'나눗셈2', '혼합계산':'혼합계산2', '배수약수':'배수약수3', '소수':'소수5', '분수':'분수6', '비':'비4' };
var LEVEL_ORDER = [].concat(TRACK_LEVELS['곱셈'], TRACK_LEVELS['나눗셈'], TRACK_LEVELS['혼합계산'],
                               TRACK_LEVELS['배수약수'], TRACK_LEVELS['소수'], TRACK_LEVELS['분수'], TRACK_LEVELS['비']);
var LEVEL_NAME = {
  곱셈1:'구구단 튼튼', 곱셈2:'곱셈 늘리기', 곱셈3:'곱셈 도전', 곱셈4:'곱셈 마스터',
  나눗셈1:'나눗셈 첫걸음', 나눗셈2:'나머지 찾기', 나눗셈3:'나눗셈 도전',
  혼합계산1:'더하고 빼고', 혼합계산2:'곱하고 나누고', 혼합계산3:'다 섞어서',      // [신규]
  배수약수1:'배수 탐험', 배수약수2:'약수 탐험', 배수약수3:'최소공배수', 배수약수4:'최대공약수',
  소수1:'소수 만나기', 소수2:'소수 크기 재기', 소수3:'소수 더하기 빼기',           // [신규]
  소수4:'소수 곱하기 자연수', 소수5:'소수끼리 곱하기', 소수6:'소수 나누기 자연수', 소수7:'소수 나누기 마스터',
  분수1:'분수 만나기', 분수2:'같은 크기 분수', 분수3:'약분', 분수4:'통분',
  분수5:'분수 더하기 빼기', 분수6:'분수 마스터', 분수7:'분수 곱셈', 분수8:'분수 나눗셈',
  비1:'비 만나기', 비2:'비율 알기', 비3:'백분율', 비4:'비례식 마스터', 비5:'비례배분'  // [신규] 비2·비3·비5
};

var LEVEL_GRADE = {
  곱셈1:2, 곱셈2:3, 곱셈3:3, 곱셈4:4,
  나눗셈1:3, 나눗셈2:3, 나눗셈3:4,
  혼합계산1:5, 혼합계산2:5, 혼합계산3:5,
  배수약수1:5, 배수약수2:5, 배수약수3:5, 배수약수4:5,
  소수1:3, 소수2:4, 소수3:4, 소수4:5, 소수5:5, 소수6:6, 소수7:6,
  분수1:3, 분수2:3, 분수3:5, 분수4:5, 분수5:4, 분수6:5, 분수7:5, 분수8:6,
  비1:6, 비2:6, 비3:6, 비4:6, 비5:6
};

// ===== PART 2. 문제 생성기 — [v7 변경] 키 전부 한글 트랙명으로 교체, 소수7종·혼합계산3종·비3종 신규 추가 =====
var GEN = {
  곱셈1: function () {
    var a = rand(2,9), b = rand(2,9);
    return { level:'곱셈1', meta:{a:a,b:b}, text: a+' × '+b, accepted:[String(a*b)], patterns:[],
      solution: a+'×'+b+' = '+(a*b) };
  },
  곱셈2: function () {
    var a = rand(2,9)*10, b = rand(2,9);
    return { level:'곱셈2', meta:{a:a,b:b}, text: a+' × '+b, accepted:[String(a*b)],
      patterns:[{ ans:String((a/10)*b), type:'자릿값 오류' }],
      solution: (a/10)+'×'+b+'='+((a/10)*b)+'에 0을 하나 붙이면 '+(a*b) };
  },
  곱셈3: function () {
    var a = rand(1,9)*10 + rand(1,9), b = rand(2,9);
    var noCarry = Math.floor(a/10)*b*10 + ((a%10)*b)%10;
    var p = (noCarry !== a*b) ? [{ ans:String(noCarry), type:'절차 오류' }] : [];
    return { level:'곱셈3', meta:{a:a,b:b}, text: a+' × '+b, accepted:[String(a*b)], patterns:p,
      solution: (a%10)+'×'+b+'와 '+Math.floor(a/10)+'0×'+b+'를 더하면 '+(a*b) };
  },
  곱셈4: function () {
    var a = rand(1,9)*10+rand(1,9), b = rand(1,9)*10+rand(1,9);
    return { level:'곱셈4', meta:{a:a,b:b}, text: a+' × '+b, accepted:[String(a*b)], patterns:[],
      solution: a+'×'+(b%10)+'과 '+a+'×'+Math.floor(b/10)+'0을 더하면 '+(a*b) };
  },
  나눗셈1: function () {
    var b = rand(2,9), q = rand(2,9), a = b*q;
    return { level:'나눗셈1', meta:{a:a,b:b,q:q}, text: a+' ÷ '+b, accepted:[String(q)], patterns:[],
      solution: b+'×'+q+'='+a+'이니까 답은 '+q };
  },
  나눗셈2: function () {
    var b = rand(2,9), q = rand(2,9), r = rand(1, b-1), a = b*q + r;
    return { level:'나눗셈2', meta:{a:a,b:b,q:q,r:r}, text: a+' ÷ '+b+'  (몫,나머지 — 예: 4,1)',
      accepted:[q+','+r, q+'나머지'+r], patterns:[],
      solution: b+'×'+q+'='+(b*q)+', 남는 게 '+r+' → 몫 '+q+' 나머지 '+r };
  },
  나눗셈3: function () {
    var b = rand(2,9), q = rand(11,33), a = b*q;
    if (a > 99) return GEN.나눗셈3();
    return { level:'나눗셈3', meta:{a:a,b:b,q:q}, text: a+' ÷ '+b, accepted:[String(q)], patterns:[],
      solution: '십의 자리부터 나누면 몫은 '+q };
  },
  // ===== [신규] 혼합계산1~3 =====
  혼합계산1: function () {
    var a = rand(5,20), b = rand(1,10), c = rand(1, Math.min(10, a+b-1));
    var val = a + b - c;
    return { level:'혼합계산1', meta:{a:a,b:b,c:c}, text: a+' + '+b+' − '+c, accepted:[String(val)], patterns:[],
      solution: '왼쪽부터 차례로: '+a+'+'+b+'='+(a+b)+', 그 다음 '+(a+b)+'−'+c+'='+val };
  },
  혼합계산2: function () {
    var b = rand(2,9), q = rand(2,9), a = b*q, c = rand(2,9);
    var val = q*c;
    return { level:'혼합계산2', meta:{a:a,b:b,c:c,q:q}, text: a+' ÷ '+b+' × '+c, accepted:[String(val)], patterns:[],
      solution: '왼쪽부터 차례로: '+a+'÷'+b+'='+q+', 그 다음 '+q+'×'+c+'='+val };
  },
  혼합계산3: function () {
    var b = rand(2,9), c = rand(2,9), bc = b*c;
    var e = rand(2,9), qd = rand(2,9), d = e*qd;
    var a = rand(1,20);
    var val = a + bc - qd;
    return { level:'혼합계산3', meta:{a:a,b:b,c:c,d:d,e:e,bc:bc,qd:qd}, text: a+' + '+b+'×'+c+' − '+d+'÷'+e,
      accepted:[String(val)],
      patterns:[{ ans:String((a+b)*c - qd), type:'순서 무시 오류' }],   // 곱셈보다 덧셈을 먼저 해버린 오류
      solution: '곱셈·나눗셈 먼저! '+b+'×'+c+'='+bc+', '+d+'÷'+e+'='+qd+'. 그 다음 '+a+'+'+bc+'−'+qd+'='+val };
  },
  배수약수1: function () {
    var n = [6,7,8,9,12,15,20,30,40][rand(0,8)];
    return { level:'배수약수1', meta:{n:n}, text: n+'의 배수를 작은 것부터 3개 (쉼표로)',
      accepted:[n+','+(n*2)+','+(n*3)], patterns:[],
      solution: n+'을 계속 더하면 돼: '+n+', '+(n*2)+', '+(n*3) };
  },
  배수약수2: function () {
    var n = [6,8,10,12,15,16,18,20][rand(0,7)];
    var divs = []; for (var i=1;i<=n;i++) if (n%i===0) divs.push(i);
    return { level:'배수약수2', meta:{n:n,divs:divs.join(',')}, text: n+'의 약수를 모두 (작은 것부터, 쉼표로)',
      accepted:[divs.join(',')],
      patterns:[{ ans:divs.slice(1,-1).join(','), type:'절차 오류' }],
      solution: '1과 '+n+'도 약수야! 전부: '+divs.join(', ') };
  },
  배수약수3: function () {
    var pairs = [[4,6],[6,8],[3,4],[6,9],[4,10],[8,12]]; var p = pairs[rand(0,5)];
    var l = lcm(p[0],p[1]);
    var pat = (p[0]*p[1] !== l) ? [{ ans:String(p[0]*p[1]), type:'개념 오류' }] : [];
    return { level:'배수약수3', meta:{a:p[0],b:p[1],l:l}, text: p[0]+'와 '+p[1]+'의 최소공배수',
      accepted:[String(l)], patterns:pat,
      solution: p[0]+'의 배수와 '+p[1]+'의 배수 중 처음 겹치는 수: '+l };
  },
  배수약수4: function () {
    var pairs = [[12,18],[6,9],[8,12],[10,15],[16,24],[12,20]]; var p = pairs[rand(0,5)];
    var g = gcd(p[0],p[1]);
    var dA = [], dB = [];
    for (var i=1;i<=p[0];i++) if (p[0]%i===0) dA.push(i);
    for (var j=1;j<=p[1];j++) if (p[1]%j===0) dB.push(j);
    return { level:'배수약수4', meta:{a:p[0],b:p[1],g:g,dA:dA.join(','),dB:dB.join(',')},
      text: p[0]+'과 '+p[1]+'의 최대공약수', accepted:[String(g)], patterns:[],
      solution: '둘 다 나누는 수 중 가장 큰 것: '+g };
  },
  // ===== [신규] 소수1~7 — 정수(자릿값 단위) 기반으로 생성해 부동소수점 오차 방지 =====
  소수1: function () {
    if (rand(0,1) === 1) {
      var n = rand(2,9);
      return { level:'소수1', meta:{n:n,hundredths:false}, text: '0.1이 '+n+'개면 얼마?',
        accepted:[(n/10).toFixed(1)], patterns:[], solution: '0.1을 '+n+'번 더하면 '+(n/10).toFixed(1) };
    }
    var n2 = rand(2,9);
    return { level:'소수1', meta:{n:n2,hundredths:true}, text: '0.01이 '+n2+'개면 얼마?',
      accepted:[(n2/100).toFixed(2)], patterns:[], solution: '0.01을 '+n2+'번 더하면 '+(n2/100).toFixed(2) };
  },
  소수2: function () {
    var t = rand(1,9), h = rand(10,99);
    var av = t/10, bv = h/100;
    if (av === bv) h = (h % 99) + 1;
    bv = h/100;
    var aStr = (t/10).toFixed(1), bStr = (h/100).toFixed(2);
    var bigger = av > bv ? aStr : bStr, smaller = av > bv ? bStr : aStr;
    return { level:'소수2', meta:{aStr:aStr,bStr:bStr}, text: aStr+'과 '+bStr+' 중 더 큰 수는?',
      accepted:[bigger], patterns:[{ ans:smaller, type:'자릿수 안 맞춘 비교 오류' }],
      solution: aStr+'의 오른쪽에 0을 채우면 '+aStr+'0 — 자릿수를 맞춰서 비교하면 더 큰 건 '+bigger };
  },
  소수3: function () {
    if (rand(0,1) === 1) {
      var t1 = rand(1,90), t2 = rand(1, 90-t1);
      var aStr = (t1/10).toFixed(1), bStr = (t2/10).toFixed(1);
      return { level:'소수3', meta:{plus:true,t1:t1,t2:t2,aStr:aStr,bStr:bStr}, text: aStr+' + '+bStr,
        accepted:[((t1+t2)/10).toFixed(1)], patterns:[],
        solution: '소수점 맞춰서 더하면: '+aStr+'+'+bStr+'='+((t1+t2)/10).toFixed(1) };
    }
    var t1b = rand(2,98), t2b = rand(1,t1b-1);
    var aStrb = (t1b/10).toFixed(1), bStrb = (t2b/10).toFixed(1);
    return { level:'소수3', meta:{plus:false,t1:t1b,t2:t2b,aStr:aStrb,bStr:bStrb}, text: aStrb+' − '+bStrb,
      accepted:[((t1b-t2b)/10).toFixed(1)], patterns:[],
      solution: '소수점 맞춰서 빼면: '+aStrb+'−'+bStrb+'='+((t1b-t2b)/10).toFixed(1) };
  },
  소수4: function () {
    var t = rand(2,98), n = rand(2,9);
    var aStr = (t/10).toFixed(1), productTenths = t*n;
    return { level:'소수4', meta:{t:t,n:n,aStr:aStr}, text: aStr+' × '+n,
      accepted:[(productTenths/10).toFixed(1)],
      patterns:[{ ans:String(productTenths), type:'소수점 위치 오류' }],
      solution: t+'×'+n+'='+productTenths+', 소수 한 자리니까 소수점을 왼쪽으로 한 칸: '+(productTenths/10).toFixed(1) };
  },
  소수5: function () {
    var t1 = rand(1,9), t2 = rand(1,9);
    var aStr = (t1/10).toFixed(1), bStr = (t2/10).toFixed(1), productHundredths = t1*t2;
    return { level:'소수5', meta:{t1:t1,t2:t2,aStr:aStr,bStr:bStr}, text: aStr+' × '+bStr,
      accepted:[(productHundredths/100).toFixed(2)],
      patterns:[{ ans:String(productHundredths), type:'소수점 위치 오류' },
                { ans:(productHundredths/10).toFixed(1), type:'소수점 위치 오류' }],
      solution: t1+'×'+t2+'='+productHundredths+', 소수 두 자리니까 소수점을 왼쪽으로 두 칸: '+(productHundredths/100).toFixed(2) };
  },
  소수6: function () {
    var n = rand(2,9), qT = rand(2,30), dividendT = qT*n;
    var dividendStr = (dividendT/10).toFixed(1);
    return { level:'소수6', meta:{n:n,qT:qT,dividendT:dividendT}, text: dividendStr+' ÷ '+n,
      accepted:[(qT/10).toFixed(1)], patterns:[],
      solution: dividendStr+'는 0.1이 '+dividendT+'개. '+dividendT+'÷'+n+'='+qT+'이니까 '+(qT/10).toFixed(1) };
  },
  소수7: function () {
    var d = rand(2,15), qT = rand(2,50), dividendH = d*qT;
    var divisorStr = (d/10).toFixed(1), dividendStr = (dividendH/100).toFixed(2);
    var val = trimDec((qT/10).toFixed(1));
    return { level:'소수7', meta:{d:d,qT:qT,dividendH:dividendH}, text: dividendStr+' ÷ '+divisorStr,
      accepted:[val, (qT/10).toFixed(1)], patterns:[],
      solution: '나누는 수를 자연수로! 둘 다 소수점을 오른쪽으로 한 칸 옮기면 '+dividendH+'÷'+d+'='+qT+', 답은 '+val };
  },
  분수1: function () {
    var d = rand(3,8), n = rand(1, d-1);
    return { level:'분수1', meta:{n:n,d:d}, text: '피자를 '+d+'조각으로 똑같이 나눠서 '+n+'조각을 먹었어. 먹은 양을 분수로?',
      accepted:[n+'/'+d], patterns:[],

      { q: '그럼 답은?', acc: p.accepted } ];
    return [
      { q: m.c+'/'+m.d+'를 뒤집으면?', acc:[m.d+'/'+m.c] },
      { q: '이제 곱셈! '+m.a+'/'+m.b+' × '+m.d+'/'+m.c+' = ?', acc: p.accepted } ]; },
  비4: function (p) { var m = p.meta; return [
    { q: '앞의 수가 '+m.a+'에서 '+(m.a*m.k)+'로 — 몇 배가 됐지?', acc:[String(m.k)] },
    { q: '그럼 뒤도 같은 배! '+m.b+'×'+m.k+'는?', acc: p.accepted } ]; },
  비5: function (p) { var m = p.meta; return [                                          // [신규]
    { q: '전체를 몇 묶음으로 나눠? ('+m.ra+'+'+m.rb+')', acc:[String(m.ra+m.rb)] },
    { q: '전체 '+m.total+'를 '+(m.ra+m.rb)+'묶음으로 나누면 한 묶음은?', acc:[String(m.unit)] },
    { q: '그럼 각각 몇 개? (쉼표로, 예: 12,8)', acc: p.accepted } ]; }
};

// ===== PART 3. 채점 (변경 없음) =====
// [참고] 소수 문제는 parseInt가 소수점 아래를 버리므로 "계산 실수" 근접판정이 정수 자릿수 위주로 동작함.
// 파일럿 테스트 후 필요하면 소수 전용 근접판정 로직 추가 예정 (다음 세션 TODO).
function grade(problem, rawInput) {
  var v = norm(rawInput);
  if (v === '' || v.indexOf('몰라') !== -1 || v.indexOf('모르') !== -1) return '무응답/회피';
  if (problem.accepted.some(function (a) { return norm(a) === v; })) return 'correct';
  for (var i = 0; i < problem.patterns.length; i++)
    if (norm(problem.patterns[i].ans) === v) return problem.patterns[i].type;
  var num = parseFloat(v), ans = parseFloat(problem.accepted[0]);
  if (!isNaN(num) && !isNaN(ans) && Math.abs(num - ans) <= Math.max(0.1, Math.abs(ans) * 0.1)) return '계산 실수';
  return '절차 오류';
}

// ===== PART 7. 상태 + 진단 세션 — [v7 전면 교체] 이분탐색 진단으로 재설계 =====
var S = {
  mode: 'name', nickname: '', levelIdx: 0, recent: [],
  problem: null, similarLeft: 0, seenBridge: {}, records: [],
  steps: null, stepIdx: 0, stuck: [],
  sentIdx: 0, probCount: 0,
  recentTexts: [],
  grade: 6,            // [신규] 학생 학년 (입력 전 기본 6 = 캡 없음과 동일)
  afterGrade: '',      // [신규] 학년 입력 후 갈 곳: 'diagnose' | 'resume'
  recent10: [],         // [신규] 강등 판정용 최근 10문제 정오답  -- 여기 콤마 누락이 원인이었음(수정 완료)
  pendingUpIdx: -1
};
var diag = null;

// [신규] 진단 문항은 더 이상 고정 문항표가 아니라, 학습에 쓰는 GEN을 그대로 재사용해서 즉석 생성
// (트랙 7개로 늘어난 데 맞춰 v6에서 정한 이분탐색 방식 구현: 1단 게이트 → 2단 이분탐색 → 확인 1회 → 개념확인)
function startDiagnosis() {
  diag = { phase:'gate', gateIdx: firstOpenGate(0), track:null, levels:null, lo:0, hi:0, mid:0, best:-1,   // [변경] 잠긴 트랙 게이트 건너뛰고 시작
           candidateIdx:0, conceptIdx:0, placement:null, notes:[], currentItem:null };
  S.mode = 'diag';
  say('먼저 지금 어디까지 알고 있는지 확인하는 진단평가를 해볼 거야!\n이건 시험이 아니라 딱 맞는 출발점을 찾는 거라서, 맞았는지 틀렸는지는 지금은 안 알려줄 거야. 부담 갖지 말고 편하게 풀어줘. 모르면 "몰라요"라고 해도 돼!');
  askDiag();
}
// [신규] 현재 phase에 맞는 문항을 GEN으로 즉석 생성해 diag.currentItem에 저장 (같은 문항으로 채점해야 하므로 캐싱)
function askDiag() {
  if (diag.phase === 'gate') {
    diag.currentItem = GEN[GATE_LEVEL[GATE_TRACKS[diag.gateIdx]]]();
  } else if (diag.phase === 'search') {
    diag.mid = Math.floor((diag.lo + diag.hi) / 2);
    diag.currentItem = GEN[diag.levels[diag.mid]]();
  } else if (diag.phase === 'confirm') {
    diag.currentItem = GEN[diag.levels[diag.candidateIdx]]();
  } else {
    diag.currentItem = CONCEPTS[diag.conceptIdx];
  }
  say('Q. ' + diag.currentItem.text);
}
function diagCheck(item, input) {
  var v = norm(input);
  if (item.accepted.some(function (a) { return norm(a) === v; })) return true;
  if (item.patterns) item.patterns.forEach(function (p) {
    if (norm(p.ans) === v) diag.notes.push(p.type || p.note);
  });
  return false;
}
function handleDiag(input) {
  var item = diag.currentItem;
  var ok = diagCheck(item, input);

  if (diag.phase === 'gate') {
    if (ok) {
      diag.gateIdx = firstOpenGate(diag.gateIdx + 1);              // [변경] 학년상 잠긴 트랙은 건너뜀
      if (diag.gateIdx >= GATE_TRACKS.length) {
        diag.placement = lastAllowedLevel();                        // [변경] 전 게이트 통과 → 허용 범위 내 최고 레벨
        diag.phase = 'concept';
      }
    } else {
      diag.track = GATE_TRACKS[diag.gateIdx];
      diag.levels = TRACK_LEVELS[diag.track];
      diag.lo = 0;
      diag.hi = maxAllowedInTrack(diag.levels);                     // [변경] 이분탐색 상한 = 학년 캡
      diag.best = -1;
      diag.phase = 'search';
    }
  } else if (diag.phase === 'search') {
    if (ok) { diag.best = diag.mid; diag.lo = diag.mid + 1; }
    else { diag.hi = diag.mid - 1; }
    if (diag.lo > diag.hi) {
      diag.candidateIdx = Math.min(diag.best + 1, maxAllowedInTrack(diag.levels));   // [변경] 후보도 캡 안으로
      diag.phase = 'confirm';
    }
  } else if (diag.phase === 'confirm') {
    if (ok && diag.candidateIdx + 1 <= maxAllowedInTrack(diag.levels)) {             // [변경] 한 단계 위 배치도 캡 확인
      diag.placement = diag.levels[diag.candidateIdx + 1];
    } else {
      diag.placement = diag.levels[diag.candidateIdx];
    }
    diag.phase = 'concept';
  } else {
    if (!ok) diag.notes.push('개념 ' + CONCEPTS[diag.conceptIdx].id + ' 오개념 신호');
    diag.conceptIdx++;
    if (diag.conceptIdx >= CONCEPTS.length) { finishDiagnosis(); return; }
  }
  say('응, 확인했어! 다음~');
  askDiag();
}
function finishDiagnosis() {
  S.levelIdx = LEVEL_ORDER.indexOf(diag.placement);
  say('진단평가 끝! 수고했어 👏\n이제부터 ' + S.nickname + '랑 ⭐[' + LEVEL_NAME[diag.placement] + ']⭐ 단계를 같이 해볼 거야.\n지금부터는 진짜 공부 시간이라서 맞았는지 틀렸는지 바로바로 알려줄게!\n그리고 공부를 마치고 싶으면 언제든 "오늘 수업은 끝이야!"라고 말해줘.');
  S.records.push({ type:'진단', placement: diag.placement, notes: diag.notes });
  startLearning();
}

// ===== PART 8. 학습 루프 (변경 없음) =====
function currentLevel() { return LEVEL_ORDER[S.levelIdx]; }

// [신규] 학년 캡 관련 헬퍼
function isAllowed(lv) { return LEVEL_GRADE[lv] <= S.grade + 1; }          // 이 레벨이 학년+1 안인가
function maxAllowedInTrack(levels) {                                        // 트랙 내 허용 최고 인덱스
  var m = 0;
  for (var i = 0; i < levels.length; i++) if (isAllowed(levels[i])) m = i;
  return m;
}
function lastAllowedLevel() {                                               // 전체에서 허용 최고 레벨
  for (var i = LEVEL_ORDER.length - 1; i >= 0; i--) if (isAllowed(LEVEL_ORDER[i])) return LEVEL_ORDER[i];
  return LEVEL_ORDER[0];
}
function nextAllowedIdx(from) {                                             // 위쪽으로 가장 가까운 허용 레벨
  for (var i = from + 1; i < LEVEL_ORDER.length; i++) if (isAllowed(LEVEL_ORDER[i])) return i;
  return -1;
}
function prevAllowedIdx(from) {                                             // 아래쪽으로 가장 가까운 허용 레벨
  for (var i = from - 1; i >= 0; i--) if (isAllowed(LEVEL_ORDER[i])) return i;
  return -1;
}
function firstOpenGate(from) {                                              // 허용 레벨이 하나라도 있는 다음 게이트 트랙
  var i = from;
  while (i < GATE_TRACKS.length && !TRACK_LEVELS[GATE_TRACKS[i]].some(function (lv) { return isAllowed(lv); })) i++;
  return i;
}
function clampLevelToGrade() {                                              // 이어하기 레벨이 캡 밖이면 끌어내림
  if (!isAllowed(currentLevel())) {
    var p = prevAllowedIdx(S.levelIdx + 1);
    if (p !== -1) S.levelIdx = p;
  }
}

// [신규] 학년 질문 흐름
function askGrade(after) {
  S.afterGrade = after;
  S.mode = 'grade';
  say('몇 학년이야? 숫자로 알려줘! (예: 5)');
}
function handleGrade(input) {
  var g = parseInt(String(input).replace(/[^0-9]/g, ''), 10);   // "5학년"처럼 써도 숫자만 추출
  if (!(g >= 1 && g <= 6)) { say('1부터 6 사이 숫자로 알려줘! 몇 학년이야?'); return; }
  S.grade = g;
  say(g + '학년이구나! 알겠어 😊');
  if (S.afterGrade === 'resume') { clampLevelToGrade(); startLearning(); }
  else startDiagnosis();
}

// [신규] 정오답을 승급용(5개)·강등용(10개) 윈도우에 동시 기록
function pushResult(ok) {
  S.recent.push(ok);
  if (S.recent.length > 5) S.recent.shift();
  S.recent10.push(ok);
  if (S.recent10.length > 10) S.recent10.shift();
}

// [신규] 강등 판정: 최근 10문제 중 정답 5개 미만이면 한 단계 아래로
function maybeDemote() {
  if (S.recent10.length < 10) return false;
  var c = S.recent10.filter(Boolean).length;
  if (c >= 5) return false;
  S.recent = []; S.recent10 = [];                 // 판정 윈도우 리셋 = 강등 직후 유예
  var prev = prevAllowedIdx(S.levelIdx);
  if (prev === -1) return false;                  // 더 내려갈 곳 없으면 리셋만
  S.levelIdx = prev;
  sys('🧗 [' + LEVEL_NAME[currentLevel()] + '] 단계로 잠깐 내려갈게!');
  say('조금 어려웠지? 괜찮아, 여기서 더 탄탄하게 다지고 다시 올라가자! 💪');
  startLearning();
  return true;
}

// [신규] "어려워" 류 발화 감지 (숫자 답과 겹칠 일 없는 표현만)
function isHardCommand(t) {
  var v = norm(t);
  return v.indexOf('어려') !== -1 || v.indexOf('낮춰') !== -1 ||
         v.indexOf('내려줘') !== -1 || v.indexOf('쉬운') !== -1 || v.indexOf('쉽게') !== -1;
}

// [신규] 앞쪽으로 "자기 학년 이하" 첫 레벨 찾기 (위 학년 과정 건너뛰기용)
function nextGradeFitIdx(from) {
  for (var i = from + 1; i < LEVEL_ORDER.length; i++) {
    if (LEVEL_GRADE[LEVEL_ORDER[i]] <= S.grade) return i;
  }
  return -1;
}

// [신규] 학생이 어렵다고 할 때: 위 학년 과정이면 다음 트랙으로 점프, 아니면 한 단계 아래로
function stepDown() {
  S.recent = []; S.recent10 = [];                        // 이동 후 판정 유예
  var target = -1;
  if (LEVEL_GRADE[currentLevel()] > S.grade) {
    target = nextGradeFitIdx(S.levelIdx);                // 지금이 위 학년 과정 → 앞으로 건너뜀
    if (target !== -1) say('그래, 여기는 사실 ' + LEVEL_GRADE[currentLevel()] + '학년 과정이었어! 대신 다음 과정으로 넘어가서 해보자 😄');
  }
  if (target === -1) target = prevAllowedIdx(S.levelIdx); // 자기 학년 과정 → 한 단계 아래
  if (target === -1) { say('여기가 제일 첫 단계야! 천천히 같이 해보자, 할 수 있어 💪'); nextProblem(); return; }
  S.levelIdx = target;
  sys('🧭 [' + LEVEL_NAME[currentLevel()] + '] 단계로 이동!');
  say('좋아, [' + LEVEL_NAME[currentLevel()] + '] 단계로 가자!');
  startLearning();
}

// [신규] 승급 확인 응답 처리 (도전 / 넘어가기)
function handleAskUp(input) {
  var v = norm(input);
  if (v.indexOf('도전') !== -1 || v === '응' || v === '네' || v.indexOf('좋아') !== -1 || v.indexOf('할래') !== -1) {
    S.levelIdx = S.pendingUpIdx; S.pendingUpIdx = -1;
    sys('🎊 레벨 업! → [' + LEVEL_NAME[currentLevel()] + '] 단계');
    say('멋져! 도전 정신 최고야 🔥 [' + LEVEL_NAME[currentLevel()] + '] 단계 시작!');
    startLearning();
  } else if (v.indexOf('넘어') !== -1 || v.indexOf('다른') !== -1 || v.indexOf('아니') !== -1) {
    var fit = nextGradeFitIdx(S.pendingUpIdx - 1);     // 위 학년 과정 건너뛰고 다음 맞는 레벨
    S.pendingUpIdx = -1;
    if (fit !== -1) {
      S.levelIdx = fit;
      sys('🧭 [' + LEVEL_NAME[currentLevel()] + '] 단계로 이동!');
      say('좋아! [' + LEVEL_NAME[currentLevel()] + '] 단계로 넘어가자 🚀');
      startLearning();
    } else {
      say('넘어갈 다음 과정이 없네! 지금 단계에서 조금 더 연습하자 😊');
      nextProblem();
    }
  } else {
    say('"도전" 아니면 "넘어가기"로 알려줘!');
  }
}

function startLearning() {
  var lv = currentLevel();
  if (BRIDGE[lv] && !S.seenBridge[lv]) { S.seenBridge[lv] = true; say(BRIDGE[lv]); }
  nextProblem();
}

function nextProblem() {
  if (maybeDemote()) return; 
  var lv = currentLevel();
  S.probCount++;
  if (S.probCount > 1 && (S.probCount - 1) % 10 === 0 && sendSave('중간')) {
    sys('💾 여기까지 자동 저장했어!');
  }
  S.problem = genFresh(lv);
  if (WORDT[lv] && Math.random() < 0.3) {
    var wt = WORDT[lv](S.problem.meta);
    if (wt) S.problem.text = wt;
  }
  S.mode = 'learn';
  say('Q. ' + S.problem.text);
}

function genFresh(lv) {
  var p, tries = 0;
  do { p = GEN[lv](); tries++; }
  while (tries < 15 && S.recentTexts.indexOf(p.text) !== -1);
  S.recentTexts.push(p.text);
  if (S.recentTexts.length > 8) S.recentTexts.shift();   // 8개 넘으면 오래된 것부터 삭제
  return p;
}

function handleLearn(input) {
  var result = grade(S.problem, input);
  S.records.push({ type:'풀이', level: currentLevel(), q: S.problem.text, a: input, result: result });
  if (result === 'correct') { onCorrect(); return; }
  S.lastWrong = input;
  pushResult(false);                                               // [변경] 강등 윈도우에도 기록
  if (result === '계산 실수') {
    S.mode = 'retry';
    say('아깝다! 거의 다 왔어. 천천히 한 번만 다시 계산해볼래?');
    return;
  }
  S.mode = 'why';
  if (result === '무응답/회피') { explainAndSimilar(''); }
  else { say('음, 정답은 아니야. 어떻게 풀었는지 얘기해줄래? (모르겠으면 "모르겠어"라고 해도 돼)'); }
}

function handleRetry(input) {
  var result = grade(S.problem, input);
  S.records.push({ type:'재시도', level: currentLevel(), q: S.problem.text, a: input, result: result });
  if (result === 'correct') { say('그렇지! 천천히 하면 되는 거였어 👍'); onCorrect(true); return; }
  S.lastWrong = input;
  S.mode = 'why';
  say('한 번 더 틀렸네. 괜찮아! 어떻게 풀었는지 말해줄래?');
}

function handleWhy(input) {
  S.records.push({ type:'학생설명', level: currentLevel(), q: S.problem.text, text: input });
  explainAndSimilar(input);
}

function explainAndSimilar(studentSaid) {
  var lv = currentLevel();
  var api = new URLSearchParams(location.search).get('api');
  if (!api) { scriptedExplain(studentSaid, lv); askSimilar(lv); return; }
  S.mode = 'wait';
  say('음, 어떻게 설명하면 좋을까… 잠깐 생각할게 🤔');
  fetch(api, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      action: 'chat', level: lv, levelName: LEVEL_NAME[lv], concept: CONCEPT[lv],
      problem: S.problem.text, answer: S.problem.accepted[0],
      studentAnswer: S.lastWrong || '', studentSaid: studentSaid
    })
  }).then(function (r) { return r.json(); })
    .then(function (d) {
      if (d.ok && d.reply) {
        say(d.reply);
        S.records.push({ type:'AI설명', level: lv, q: S.problem.text, text: d.reply });
      } else { scriptedExplain(studentSaid, lv); }
      askSimilar(lv);
    })
    .catch(function () { scriptedExplain(studentSaid, lv); askSimilar(lv); });
}

function scriptedExplain(studentSaid, lv) {
  if (norm(studentSaid).indexOf('몰라') !== -1 || norm(studentSaid).indexOf('모르') !== -1 || studentSaid === '') {
    say('괜찮아, 모를 수 있어! 같이 보자.\n\n' + CONCEPT[lv]);
  } else {
    say('아하, 그렇게 생각했구나! 알려줘서 고마워. 그럼 이렇게 생각해보자.\n\n' + CONCEPT[lv]);
  }
}

function askSimilar(lv) {
  S.similarLeft = 1;
  S.problem = genFresh(lv);
  S.mode = 'similar';
  say('그럼 비슷한 문제 하나만 더!\nQ. ' + S.problem.text);
}

function handleSimilar(input) {
  var result = grade(S.problem, input);
  S.records.push({ type:'유사문제', level: currentLevel(), q: S.problem.text, a: input, result: result });
  if (result === 'correct') { say('바로 그거야! 이제 알겠지? 🙌'); onCorrect(true); return; }
  var lv = currentLevel();
  pushResult(false);                                               // [변경] 강등 윈도우에도 기록
  if (STEPS[lv]) {
    S.steps = STEPS[lv](S.problem); S.stepIdx = 0; S.stuck = [];
    S.mode = 'steps';
    say('좋아, 이번엔 한 단계씩 같이 풀어보자! 조금씩 가면 다 풀 수 있어.');
    say('Q. ' + S.steps[0].q);
  } else {
    say('이번엔 정답을 같이 볼게.\n정답: ' + S.problem.accepted[0] + '\n' + S.problem.solution +
        '\n\n다음에 또 나오니까 걱정 마! 계속 가보자.');
    nextProblem();
  }
}

function handleSteps(input) {
  var cur = S.steps[S.stepIdx];
  var ok = cur.acc.some(function (a) { return norm(a) === norm(input); });
  if (ok) { say('맞아! 잘하고 있어 👍'); }
  else {
    S.stuck.push(cur.q);
    say('이 단계 답은 ' + cur.acc[0] + '(이)야. 계속 가보자!');
  }
  S.stepIdx++;
  if (S.stepIdx < S.steps.length) { say('Q. ' + S.steps[S.stepIdx].q); return; }
  S.records.push({ type:'단계풀이', level: currentLevel(), q: S.problem.text, stuck: S.stuck.slice() });
  say(S.stuck.length === 0
      ? '봐, 한 단계씩 하니까 다 풀었지? 이렇게 하면 돼! 🎉'
      : '끝까지 같이 풀었어! 막혔던 부분은 다음에 또 연습하자. 계속 가보자!');
  nextProblem();
}

function onCorrect(afterStruggle) {
  if (!afterStruggle) say('정답! 🎉');
  pushResult(true);
  var correctCount = S.recent.filter(Boolean).length;
  if (S.recent.length === 5 && correctCount >= 4) {
    var next = nextAllowedIdx(S.levelIdx);
    S.recent = []; S.recent10 = [];
    if (next !== -1) {
      if (LEVEL_GRADE[LEVEL_ORDER[next]] > S.grade) {              // [변경] 위 학년 과정으로의 승급은 물어보고
        S.pendingUpIdx = next;
        S.mode = 'askup';
        say('와, 다 맞혔어! 그런데 다음 단계 [' + LEVEL_NAME[LEVEL_ORDER[next]] + ']는 ' +
            LEVEL_GRADE[LEVEL_ORDER[next]] + '학년 과정이야.\n도전해볼래, 아니면 다른 과정으로 넘어갈래? ("도전" / "넘어가기")');
        return;
      }
      S.levelIdx = next;
      sys('🎊 레벨 업! → [' + LEVEL_NAME[currentLevel()] + '] 단계');
      say('축하해 ' + S.nickname + '! 이제 [' + LEVEL_NAME[currentLevel()] + '] 단계야. 새로운 모험 시작!');
      startLearning();
      return;
    }
    say('🏆 와… ' + S.nickname + ', 지금 갈 수 있는 마지막 단계까지 전부 해냈어! 최고야!!');
  }
  nextProblem();
}

// ===== PART 8.5 수업 종료 — 요약 생성 + 선생님 전송 (변경 없음) =====
function isEndCommand(t) {
  var v = norm(t);
  return v.indexOf('끝이야') !== -1 || v.indexOf('수업끝') !== -1 ||
         v === '끝' || v === '저장' || v.indexOf('그만할래') !== -1;
}

function sendSave(kind) {
  var api = new URLSearchParams(location.search).get('api');
  if (!api) return false;
  var solved = S.records.filter(function (r) { return r.type === '풀이' || r.type === '재시도' || r.type === '유사문제'; });
  var correct = solved.filter(function (r) { return r.result === 'correct'; }).length;
  var stuckAll = [];
  S.records.slice(S.sentIdx).forEach(function (r) { if (r.type === '단계풀이') r.stuck.forEach(function (s) { stuckAll.push(s); }); });
  fetch(api, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({
      action: 'log', kind: kind, nickname: S.nickname, date: new Date().toISOString(),
      level: currentLevel(), solvedCount: solved.length, correctCount: correct,
      stuckSteps: stuckAll,
      grade: S.grade,                                              // [변경] 학년 전송 (세션 H열)
      records: S.records.slice(S.sentIdx)
    }) });
  S.sentIdx = S.records.length;
  return true;
}

function endSession() {
  var solved = S.records.filter(function (r) { return r.type === '풀이' || r.type === '재시도' || r.type === '유사문제'; });
  var correct = solved.filter(function (r) { return r.result === 'correct'; }).length;

  say('오늘 수업 끝! 정말 수고했어 ' + S.nickname + ' 🎉\n' +
      '오늘 푼 문제: ' + solved.length + '개 (정답 ' + correct + '개)\n' +
      '지금 단계: [' + LEVEL_NAME[currentLevel()] + ']\n' +
      '내일 또 만나자!');

  if (sendSave('최종')) { say('오늘 공부한 내용을 선생님께 보냈어! 📨'); }
  else { sys('연습 모드: 선생님 전송은 배포판(api 주소 연결 시)에서 동작해요.'); }
  S.mode = 'done';
}

function loadStudent() {
  var api = new URLSearchParams(location.search).get('api');
  if (!api) { askGrade('diagnose'); return; }                      // [변경] 연습 모드도 학년은 물음
  S.mode = 'wait';
  fetch(api, { method: 'POST', headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify({ action: 'load', nickname: S.nickname }) })
  .then(function (r) { return r.json(); })
  .then(function (d) {
    if (d.ok && d.found && LEVEL_ORDER.indexOf(d.level) !== -1) {
      S.levelIdx = LEVEL_ORDER.indexOf(d.level);
      say('어? 지난번에 만났었지! ⭐[' + LEVEL_NAME[d.level] + ']⭐ 단계까지 했었어. 오늘은 이어서 해보자!\n(마치고 싶을 땐 "오늘 수업은 끝이야!"라고 말해줘)');
      var g = parseInt(d.grade, 10);                             // [변경] 저장된 학년 재사용
      if (g >= 1 && g <= 6) { S.grade = g; clampLevelToGrade(); startLearning(); }
      else askGrade('resume');                                     // [변경] 예전 기록엔 학년 없음 → 한 번만 물음
    } else { askGrade('diagnose'); }
  })
  .catch(function () { askGrade('diagnose'); });
}

// ===== PART 9. 입력 라우팅 (변경 없음) =====
function handleInput() {
  var el = document.getElementById('userInput');
  var input = el.value.trim();
  if (input === '') return;
  echo(input); el.value = '';
  if (S.mode === 'done') { say('오늘 수업은 끝났어! 내일 또 만나 👋'); return; }
  if (S.mode !== 'name' && isEndCommand(input)) { endSession(); return; }
  if ((S.mode === 'learn' || S.mode === 'retry' || S.mode === 'similar') && isHardCommand(input)) {  // [변경] 문제 푸는 중 "어려워" → 즉시 이동
    S.records.push({ type:'난이도요청', level: currentLevel(), text: input });                        // [변경] 기록도 남김
    stepDown();
    return;
  }
  if (S.mode === 'name') {
    S.nickname = input.slice(0, 10);
    say('반가워 ' + S.nickname + '! 나는 수학 친구야 🤗');
    loadStudent();
  }
  else if (S.mode === 'grade') handleGrade(input);
  else if (S.mode === 'askup') handleAskUp(input);                 // [변경] 승급 확인 모드
  else if (S.mode === 'diag') handleDiag(input);
  else if (S.mode === 'learn') handleLearn(input);
  else if (S.mode === 'retry') handleRetry(input);
  else if (S.mode === 'why') handleWhy(input);
  else if (S.mode === 'similar') handleSimilar(input);
  else if (S.mode === 'steps') handleSteps(input);
  else if (S.mode === 'wait') say('잠깐만~ 아직 생각 중이야! 🤔');
}

// [변경] 인라인 onclick 대신 addEventListener 사용 (GAS CSP 대응)
// Enter 키로도 보낼 수 있게 keydown 리스너도 함께 등록
document.getElementById('sendBtn').addEventListener('click', handleInput);
document.getElementById('userInput').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') handleInput();
});

say('안녕! 뭐라고 부르면 좋을까? 별명을 알려줘 (진짜 이름 말고 별명도 좋아!)');
</script>
